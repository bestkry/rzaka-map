<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kółko i Krzyżyk — Osiedle Rżąka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  min-height:100dvh;
  font-family:'Inter',sans-serif;
  background:#0d1117;
  color:#c9d1d9;
  display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
}
button{cursor:pointer;font:inherit;border:none;background:none}
input{font:inherit;border:none;background:none;color:inherit}

/* ─── VARIABLES ────────────────────────────────────────────── */
:root{
  --bg:#0d1117;
  --panel:#161b22;
  --panel-alt:#1c2129;
  --border:#30363d;
  --border-light:#484f58;
  --text:#e6edf3;
  --text-muted:#8b949e;
  --text-dim:#484f58;
  --cyan:#60a5fa;
  --cyan-glow:rgba(96,165,250,.35);
  --pink:#f472b6;
  --pink-glow:rgba(244,114,182,.35);
  --green:#4ade80;
  --green-glow:rgba(74,222,128,.25);
  --gold:#fbbf24;
  --radius:8px;
  --radius-lg:12px;
  --transition:180ms cubic-bezier(.16,1,.3,1);
  --font-display:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
}

/* ─── BACK LINK ────────────────────────────────────────────── */
.back-link{
  position:fixed;top:16px;left:16px;z-index:100;
  font-family:var(--font-body);font-size:13px;font-weight:500;
  color:var(--text-muted);text-decoration:none;
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--radius);
  background:rgba(22,27,34,.9);border:1px solid var(--border);
  backdrop-filter:blur(10px);
  transition:color var(--transition),border-color var(--transition),background var(--transition);
}
.back-link:hover{color:var(--text);border-color:var(--border-light);background:rgba(22,27,34,1)}

/* ─── CONTAINER ────────────────────────────────────────────── */
.game-container{
  width:100%;max-width:480px;
  padding:24px 20px;
  display:flex;flex-direction:column;align-items:center;
  min-height:100dvh;justify-content:center;
}

/* ─── SCREEN TRANSITIONS ───────────────────────────────────── */
.screen{
  display:none;flex-direction:column;align-items:center;width:100%;
  animation:fadeIn .35s cubic-bezier(.16,1,.3,1) both;
}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ─── TITLE ────────────────────────────────────────────────── */
.title{
  font-family:var(--font-display);
  font-size:clamp(1.75rem,5vw,2.5rem);
  font-weight:700;color:var(--text);
  letter-spacing:-.02em;
  text-align:center;
  margin-bottom:4px;
}
.title span.x-color{color:var(--cyan);text-shadow:0 0 20px var(--cyan-glow)}
.title span.o-color{color:var(--pink);text-shadow:0 0 20px var(--pink-glow)}
.subtitle{
  font-family:var(--font-body);
  font-size:13px;color:var(--text-dim);
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:36px;
}

/* ─── FORM ELEMENTS ────────────────────────────────────────── */
.input-group{
  width:100%;max-width:320px;margin-bottom:16px;
}
.input-group label{
  display:block;font-size:12px;font-weight:600;
  color:var(--text-muted);letter-spacing:.04em;
  text-transform:uppercase;margin-bottom:6px;
}
.input-field{
  width:100%;padding:12px 16px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);
  font-size:15px;font-weight:500;
  transition:border-color var(--transition),box-shadow var(--transition);
  outline:none;
}
.input-field:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 3px rgba(96,165,250,.15);
}
.input-field::placeholder{color:var(--text-dim)}

/* ─── BUTTONS ──────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 28px;border-radius:var(--radius);
  font-family:var(--font-display);font-size:14px;font-weight:600;
  letter-spacing:.03em;text-transform:uppercase;
  transition:all var(--transition);
  min-width:180px;
}
.btn-primary{
  background:var(--cyan);color:#0d1117;
  box-shadow:0 0 20px var(--cyan-glow);
}
.btn-primary:hover{
  background:#7bb8fc;
  box-shadow:0 0 30px rgba(96,165,250,.5);
  transform:translateY(-1px);
}
.btn-primary:active{transform:translateY(0)}

.btn-secondary{
  background:transparent;color:var(--pink);
  border:1px solid var(--pink);
  box-shadow:0 0 12px rgba(244,114,182,.1);
}
.btn-secondary:hover{
  background:rgba(244,114,182,.08);
  box-shadow:0 0 20px rgba(244,114,182,.2);
  transform:translateY(-1px);
}
.btn-secondary:active{transform:translateY(0)}

.btn-ghost{
  background:transparent;color:var(--text-muted);
  border:1px solid var(--border);
}
.btn-ghost:hover{color:var(--text);border-color:var(--border-light)}

.btn-group{
  display:flex;flex-direction:column;gap:12px;
  width:100%;max-width:320px;margin-top:8px;
}
.btn-group .btn{width:100%}

/* ─── ROOM CODE DISPLAY ────────────────────────────────────── */
.room-code-display{
  font-family:var(--font-display);
  font-size:clamp(3rem,10vw,5rem);
  font-weight:700;color:var(--green);
  letter-spacing:.25em;
  text-shadow:0 0 40px var(--green-glow),0 0 80px rgba(74,222,128,.12);
  margin:20px 0 8px;
  user-select:all;
}
.room-code-label{
  font-size:13px;color:var(--text-dim);
  letter-spacing:.05em;text-transform:uppercase;
  margin-bottom:4px;
}
.room-code-hint{
  font-size:13px;color:var(--text-muted);margin-bottom:32px;
}

/* ─── WAITING ANIMATION ────────────────────────────────────── */
.waiting-text{
  font-size:15px;color:var(--text-muted);
  margin-bottom:32px;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ─── GAME HEADER (PLAYERS) ────────────────────────────────── */
.players-bar{
  display:flex;align-items:center;justify-content:center;gap:16px;
  width:100%;padding:16px 0;margin-bottom:12px;
}
.player-info{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:var(--radius);
  background:var(--panel);border:1px solid var(--border);
  font-size:14px;font-weight:600;
  transition:all .4s ease;
  min-width:0;
}
.player-info .symbol{
  font-family:var(--font-display);font-weight:700;
  font-size:18px;flex-shrink:0;
}
.player-info .nick{
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:100px;
}
.player-info.x-player .symbol{color:var(--cyan);text-shadow:0 0 8px var(--cyan-glow)}
.player-info.o-player .symbol{color:var(--pink);text-shadow:0 0 8px var(--pink-glow)}
.player-info.active-turn{
  border-color:var(--cyan);
  box-shadow:0 0 16px var(--cyan-glow);
}
.player-info.active-turn.o-player{
  border-color:var(--pink);
  box-shadow:0 0 16px var(--pink-glow);
}
.vs-label{
  font-family:var(--font-display);font-size:13px;
  font-weight:600;color:var(--text-dim);
  letter-spacing:.08em;
}

/* ─── SCORE ────────────────────────────────────────────────── */
.score-bar{
  display:flex;align-items:center;justify-content:center;gap:24px;
  font-size:12px;color:var(--text-dim);
  letter-spacing:.04em;text-transform:uppercase;
  margin-bottom:16px;font-weight:600;
}
.score-bar .score-x{color:var(--cyan)}
.score-bar .score-o{color:var(--pink)}
.score-bar .score-d{color:var(--text-dim)}

/* ─── BOARD ────────────────────────────────────────────────── */
.board-wrapper{
  position:relative;
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:6px;padding:6px;
  background:var(--border);border-radius:var(--radius-lg);
  box-shadow:0 0 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.03);
}
.cell{
  width:clamp(90px,22vw,120px);height:clamp(90px,22vw,120px);
  background:var(--panel);border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  cursor:default;
  position:relative;overflow:hidden;
  transition:background var(--transition),box-shadow var(--transition);
}
.cell.hoverable{cursor:pointer}
.cell.hoverable:hover{
  background:var(--panel-alt);
  box-shadow:inset 0 0 20px rgba(96,165,250,.06);
}
/* Stagger entrance */
.cell{opacity:0;animation:cellIn .4s cubic-bezier(.16,1,.3,1) both}
.cell:nth-child(1){animation-delay:.05s}
.cell:nth-child(2){animation-delay:.1s}
.cell:nth-child(3){animation-delay:.15s}
.cell:nth-child(4){animation-delay:.2s}
.cell:nth-child(5){animation-delay:.25s}
.cell:nth-child(6){animation-delay:.3s}
.cell:nth-child(7){animation-delay:.35s}
.cell:nth-child(8){animation-delay:.4s}
.cell:nth-child(9){animation-delay:.45s}
@keyframes cellIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:none}}

/* Pieces */
.cell .piece{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.cell .piece svg{
  width:52%;height:52%;
  animation:pieceIn .3s cubic-bezier(.16,1,.3,1) both;
}
@keyframes pieceIn{from{opacity:0;transform:scale(.5) rotate(-15deg)}to{opacity:1;transform:none}}

/* X piece */
.cell .piece.x-piece svg line{
  stroke:var(--cyan);stroke-width:8;stroke-linecap:round;
  filter:drop-shadow(0 0 6px var(--cyan-glow));
}
/* O piece */
.cell .piece.o-piece svg circle{
  stroke:var(--pink);stroke-width:8;fill:none;stroke-linecap:round;
  filter:drop-shadow(0 0 6px var(--pink-glow));
}

/* Winning cells */
.cell.win-cell{
  animation:winPulse 1.5s ease-in-out infinite alternate;
}
.cell.win-cell.x-win{
  background:rgba(96,165,250,.08);
  box-shadow:inset 0 0 20px rgba(96,165,250,.12),0 0 12px rgba(96,165,250,.15);
  border:1px solid rgba(96,165,250,.3);
}
.cell.win-cell.o-win{
  background:rgba(244,114,182,.08);
  box-shadow:inset 0 0 20px rgba(244,114,182,.12),0 0 12px rgba(244,114,182,.15);
  border:1px solid rgba(244,114,182,.3);
}
@keyframes winPulse{
  from{opacity:.85}
  to{opacity:1}
}

/* ─── TURN INDICATOR ───────────────────────────────────────── */
.turn-indicator{
  margin-top:20px;padding:10px 24px;
  border-radius:var(--radius);
  font-size:14px;font-weight:600;
  background:var(--panel);border:1px solid var(--border);
  text-align:center;
  transition:all .3s ease;
}
.turn-indicator.your-turn{
  color:var(--green);border-color:rgba(74,222,128,.3);
  box-shadow:0 0 16px var(--green-glow);
  animation:turnPulse 1.5s ease-in-out infinite;
}
.turn-indicator.waiting{
  color:var(--text-muted);
}
@keyframes turnPulse{0%,100%{box-shadow:0 0 16px var(--green-glow)}50%{box-shadow:0 0 30px rgba(74,222,128,.35)}}

/* ─── RESULT OVERLAY ───────────────────────────────────────── */
.result-banner{
  text-align:center;margin:20px 0 16px;
  animation:resultIn .5s cubic-bezier(.16,1,.3,1) both;
}
@keyframes resultIn{from{opacity:0;transform:scale(.8) translateY(20px)}to{opacity:1;transform:none}}
.result-banner .result-text{
  font-family:var(--font-display);
  font-size:clamp(1.5rem,6vw,2.5rem);
  font-weight:700;
  letter-spacing:-.01em;
  margin-bottom:4px;
}
.result-banner .result-sub{
  font-size:13px;color:var(--text-muted);
}
.result-win{color:var(--green);text-shadow:0 0 30px var(--green-glow)}
.result-lose{color:#f87171;text-shadow:0 0 30px rgba(248,113,113,.3)}
.result-draw{color:var(--gold);text-shadow:0 0 30px rgba(251,191,36,.3)}

.result-actions{
  display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;justify-content:center;
}
.result-actions .btn{min-width:140px;font-size:13px;padding:10px 20px}

/* ─── STATUS / ERROR ───────────────────────────────────────── */
.status-msg{
  font-size:13px;color:var(--text-dim);
  text-align:center;margin-top:12px;
  min-height:20px;
}
.status-msg.error{color:#f87171}

/* ─── SCANLINE EFFECT ──────────────────────────────────────── */
body::before{
  content:'';position:fixed;inset:0;z-index:9999;
  pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.03) 2px,
    rgba(0,0,0,.03) 4px
  );
}

/* ─── BACKGROUND GRID ──────────────────────────────────────── */
body::after{
  content:'';position:fixed;inset:0;z-index:-1;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(48,54,61,.2) 1px,transparent 1px),
    linear-gradient(90deg,rgba(48,54,61,.2) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 60% 50% at 50% 40%,black 20%,transparent 70%);
  -webkit-mask-image:radial-gradient(ellipse 60% 50% at 50% 40%,black 20%,transparent 70%);
}

/* ─── CONNECTION STATUS ────────────────────────────────────── */
.connection-dot{
  display:inline-block;width:8px;height:8px;
  border-radius:50%;margin-right:6px;
  background:var(--text-dim);
  vertical-align:middle;
}
.connection-dot.connected{background:var(--green);box-shadow:0 0 6px var(--green-glow)}
.connection-dot.error{background:#f87171;box-shadow:0 0 6px rgba(248,113,113,.3)}

/* ─── RANKING BUTTON ──────────────────────────────────────── */
.ranking-btn{
  position:fixed;top:16px;right:16px;z-index:200;
  font-family:var(--font-display);font-size:13px;font-weight:600;
  color:var(--gold);text-decoration:none;
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--radius);
  background:rgba(22,27,34,.9);border:1px solid rgba(251,191,36,.3);
  backdrop-filter:blur(10px);
  cursor:pointer;
  transition:color var(--transition),border-color var(--transition),background var(--transition),box-shadow var(--transition);
  letter-spacing:.03em;
}
.ranking-btn:hover{
  background:rgba(22,27,34,1);
  border-color:rgba(251,191,36,.6);
  box-shadow:0 0 16px rgba(251,191,36,.15);
}

/* ─── RANKING OVERLAY ──────────────────────────────────────── */
.ranking-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;
  transition:opacity .25s ease;
}
.ranking-overlay.open{
  opacity:1;pointer-events:all;
}

/* ─── RANKING PANEL ────────────────────────────────────────── */
.ranking-panel{
  position:fixed;top:0;right:0;bottom:0;z-index:400;
  width:min(380px,100vw);
  background:rgba(13,17,23,.97);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.16,1,.3,1);
  overflow:hidden;
}
.ranking-panel.open{
  transform:translateX(0);
}

.ranking-panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.ranking-panel-title{
  font-family:var(--font-display);
  font-size:17px;font-weight:700;
  color:var(--text);
  letter-spacing:-.01em;
}
.ranking-close{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius);
  color:var(--text-muted);
  background:transparent;
  border:1px solid var(--border);
  cursor:pointer;
  font-size:16px;
  transition:all var(--transition);
}
.ranking-close:hover{color:var(--text);border-color:var(--border-light)}

.ranking-panel-body{
  flex:1;overflow-y:auto;
  padding:16px 20px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.ranking-panel-body::-webkit-scrollbar{width:4px}
.ranking-panel-body::-webkit-scrollbar-track{background:transparent}
.ranking-panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ─── RANKING TABLE ────────────────────────────────────────── */
.ranking-table{
  width:100%;border-collapse:collapse;
  font-family:var(--font-body);
  font-size:14px;
}
.ranking-table th{
  text-align:left;
  font-size:11px;font-weight:600;
  letter-spacing:.07em;text-transform:uppercase;
  color:var(--text-dim);
  padding:0 10px 10px;
  border-bottom:1px solid var(--border);
}
.ranking-table th:last-child{text-align:right}
.ranking-table td{
  padding:10px;
  border-bottom:1px solid rgba(48,54,61,.4);
  color:var(--text-muted);
  vertical-align:middle;
}
.ranking-table td:last-child{text-align:right}
.ranking-table tr:last-child td{border-bottom:none}
.ranking-table tbody tr{
  transition:background var(--transition);
}
.ranking-table tbody tr:hover{
  background:rgba(255,255,255,.03);
}

/* Rank cell */
.rank-num{
  font-family:var(--font-display);font-weight:700;
  font-size:13px;color:var(--text-dim);
  width:32px;
}
.rank-num.rank-1{color:var(--gold);text-shadow:0 0 10px rgba(251,191,36,.4)}
.rank-num.rank-2{color:#94a3b8}
.rank-num.rank-3{color:#c07d3c}

/* Nick cell */
.rank-nick{
  font-weight:500;color:var(--text);
  max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.rank-nick.is-me{
  color:var(--cyan);
  text-shadow:0 0 8px var(--cyan-glow);
}
.rank-row-1 td{background:rgba(251,191,36,.04)}

/* Wins */
.rank-wins{
  font-family:var(--font-display);font-weight:700;
  font-size:15px;color:var(--text);
}
.rank-row-1 .rank-wins{color:var(--gold)}

/* Me badge */
.me-badge{
  display:inline-block;
  font-size:9px;font-weight:700;letter-spacing:.05em;
  background:rgba(96,165,250,.15);color:var(--cyan);
  border:1px solid rgba(96,165,250,.3);
  border-radius:4px;padding:1px 5px;
  margin-left:6px;vertical-align:middle;
  text-transform:uppercase;
}

/* Empty / loading */
.ranking-empty{
  text-align:center;padding:40px 20px;
  font-size:14px;color:var(--text-dim);
}
.ranking-loader{
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:30px 20px;
  font-size:13px;color:var(--text-muted);
}
.ranking-loader::before{
  content:'';
  width:14px;height:14px;
  border:2px solid var(--border);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin .7s linear infinite;
  flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

.ranking-updated{
  font-size:11px;color:var(--text-dim);
  text-align:center;margin-top:12px;
  letter-spacing:.03em;
}

/* ─── RESPONSIVE ───────────────────────────────────────────── */
@media(max-width:400px){
  .game-container{padding:16px 12px}
  .players-bar{gap:8px}
  .player-info{padding:6px 10px;font-size:13px}
  .player-info .nick{max-width:70px}
  .result-actions{flex-direction:column;align-items:center}
  .result-actions .btn{width:100%;max-width:260px}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms!important;
    animation-iteration-count:1!important;
    transition-duration:.01ms!important;
  }
}
</style>
</head>
<body>

<a href="./index.html" class="back-link">← Wróć do mapy</a>

<!-- RANKING BUTTON -->
<button class="ranking-btn" id="ranking-btn" aria-label="Otwórz ranking">🏆 RANKING</button>

<!-- RANKING OVERLAY -->
<div class="ranking-overlay" id="ranking-overlay" aria-hidden="true"></div>

<!-- RANKING PANEL -->
<aside class="ranking-panel" id="ranking-panel" role="dialog" aria-modal="true" aria-label="Ranking">
  <div class="ranking-panel-header">
    <span class="ranking-panel-title">🏆 Ranking — Kółko i Krzyżyk</span>
    <button class="ranking-close" id="ranking-close" aria-label="Zamknij ranking">✕</button>
  </div>
  <div class="ranking-panel-body" id="ranking-body">
    <div class="ranking-loader">Ładowanie…</div>
  </div>
</aside>

<div class="game-container">

  <!-- ═══ ENTRY SCREEN ═══ -->
  <div id="screen-entry" class="screen active">
    <h1 class="title"><span class="x-color">KÓŁKO</span> I <span class="o-color">KRZYŻYK</span></h1>
    <p class="subtitle">Osiedle Rżąka — Multiplayer</p>

<!-- GunDB -->
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

<script>
(function(){
'use strict';

/* ═══════════════════════════════════════════════════════════════
   AUDIO — Web Audio API procedural SFX
   ═══════════════════════════════════════════════════════════════ */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ /* no audio */ }
  }
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
}

function playPlace(){
  ensureAudio(); if(!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, t);
  osc.frequency.exponentialRampToValueAtTime(400, t+0.08);
  gain.gain.setValueAtTime(0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+0.12);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t); osc.stop(t+0.12);
}

function playWin(){
  ensureAudio(); if(!audioCtx) return;
  const t = audioCtx.currentTime;
  [523.25, 659.25, 783.99, 1046.5].forEach((f,i)=>{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    const start = t + i*0.12;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.15, start+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, start+0.35);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(start); osc.stop(start+0.35);
  });
}

function playLose(){
  ensureAudio(); if(!audioCtx) return;
  const t = audioCtx.currentTime;
  [400, 350, 300, 200].forEach((f,i)=>{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = f;
    const start = t + i*0.15;
    gain.gain.setValueAtTime(0.12, start);
    gain.gain.exponentialRampToValueAtTime(0.001, start+0.3);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(start); osc.stop(start+0.3);
  });
}

function playDraw(){
  ensureAudio(); if(!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(440, t);
  osc.frequency.linearRampToValueAtTime(350, t+0.3);
  gain.gain.setValueAtTime(0.1, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+0.4);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t); osc.stop(t+0.4);
}

/* ═══════════════════════════════════════════════════════════════
   GunDB SETUP
   ═══════════════════════════════════════════════════════════════ */
let gun = null;
let room = null;
let tttLeaderDB = null;

function initGun(){
  if(gun) return;
  try{
    if(typeof Gun === 'undefined') throw new Error('GunDB not loaded');
    gun = Gun(['https://rzaka-relay.onrender.com/gun']);
    tttLeaderDB = gun.get('rzaka-ttt-leaderboard');
    // Start listening for leaderboard updates
    startLeaderboardListener();
  }catch(e){
    console.warn('GunDB init failed:', e);
    setStatus('entry-status','Błąd połączenia z serwerem','error');
  }
}

/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
let myNick = '';
let mySymbol = ''; // 'X' or 'O'
let roomCode = '';
let scores = {X:0, O:0, D:0};
let currentBoard = '---------';
let gameActive = false;
let rematchCount = 0;
let lastRenderedBoard = '';
let lastRenderedStatus = '';

/* ═══════════════════════════════════════════════════════════════
   DOM REFERENCES
   ═══════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const screens = {
  entry: $('screen-entry'),
  waiting: $('screen-waiting'),
  game: $('screen-game'),
};
const cells = document.querySelectorAll('.cell');
const boardEl = $('board');

/* ═══════════════════════════════════════════════════════════════
   SCREEN MANAGEMENT
   ═══════════════════════════════════════════════════════════════ */
function showScreen(name){
  Object.values(screens).forEach(s=>s.classList.remove('active'));
  screens[name].classList.add('active');
  // Re-trigger cell animations on game screen
  if(name==='game'){
    cells.forEach(c=>{
      c.style.animation='none';
      c.offsetHeight; // reflow
      c.style.animation='';
    });
  }
}

function setStatus(id, msg, type){
  const el = $(id);
  if(!el) return;
  el.textContent = msg;
  el.className = 'status-msg' + (type==='error'?' error':'');
}

/* ═══════════════════════════════════════════════════════════════
   ENTRY SCREEN LOGIC
   ═══════════════════════════════════════════════════════════════ */
let joinVisible = false;

$('btn-join-show').addEventListener('click', ()=>{
  joinVisible = !joinVisible;
  document.getElementById('join-section').style.display = joinVisible ? 'block' : 'none';
  if(joinVisible) $('room-input').focus();
});

$('btn-create').addEventListener('click', ()=>{
  ensureAudio();
  const nick = $('nick-input').value.trim();
  if(!nick){setStatus('entry-status','Wpisz swój nick','error');return}
  if(nick.length>16){setStatus('entry-status','Nick max 16 znaków','error');return}
  myNick = nick;
  createRoom();
});

$('btn-join').addEventListener('click', ()=>{
  ensureAudio();
  const nick = $('nick-input').value.trim();
  if(!nick){setStatus('entry-status','Wpisz swój nick','error');return}
  if(nick.length>16){setStatus('entry-status','Nick max 16 znaków','error');return}
  const code = $('room-input').value.trim();
  if(!/^\d{4}$/.test(code)){setStatus('entry-status','Kod pokoju to 4 cyfry','error');return}
  myNick = nick;
  joinRoom(code);
});

// Enter key support
$('nick-input').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-create').click()});
$('room-input').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-join').click()});

/* ═══════════════════════════════════════════════════════════════
   CREATE ROOM
   ═══════════════════════════════════════════════════════════════ */
function createRoom(){
  initGun();
  if(!gun) return;

  roomCode = String(Math.floor(1000+Math.random()*9000));
  mySymbol = 'X';

  room = gun.get('rzaka-ttt-' + roomCode);

  // Set initial state
  room.put({
    board: '---------',
    turn: 'X',
    playerX: myNick,
    playerO: '',
    status: 'waiting',
    rematch: 0
  });

  $('waiting-code').textContent = roomCode;
  showScreen('waiting');
  setStatus('waiting-status','');

  // Listen for opponent joining
  room.on(function(data){
    if(!data) return;
    if(data.playerO && data.playerO !== '' && data.status !== 'waiting'){
      startGame(data);
    } else if(data.playerO && data.playerO !== '' && data.status === 'waiting'){
      // Opponent joined, start the game
      room.put({ status: 'playing' });
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   JOIN ROOM
   ═══════════════════════════════════════════════════════════════ */
function joinRoom(code){
  initGun();
  if(!gun) return;

  roomCode = code;
  mySymbol = 'O';

  room = gun.get('rzaka-ttt-' + roomCode);

  // Check room exists by reading current state
  room.once(function(data){
    if(!data || !data.playerX){
      setStatus('entry-status','Pokój nie istnieje lub wygasł','error');
      return;
    }
    if(data.playerO && data.playerO !== ''){
      setStatus('entry-status','Pokój jest już pełny','error');
      return;
    }
    // Join as player O
    room.put({
      playerO: myNick,
      status: 'playing'
    });

    // Start listening
    startGame({
      ...data,
      playerO: myNick,
      status: 'playing'
    });
  });
}

/* ═══════════════════════════════════════════════════════════════
   CANCEL WAITING
   ═══════════════════════════════════════════════════════════════ */
$('btn-cancel-wait').addEventListener('click', ()=>{
  if(room){
    room.off();
    room.put({status:'cancelled'});
  }
  room = null;
  roomCode = '';
  showScreen('entry');
});

/* ═══════════════════════════════════════════════════════════════
   START GAME
   ═══════════════════════════════════════════════════════════════ */
function startGame(initialData){
  gameActive = true;
  rematchCount = initialData.rematch || 0;
  lastRenderedBoard = '';
  lastRenderedStatus = '';

  // Reset result UI
  $('result-banner').style.display = 'none';
  $('result-actions').style.display = 'none';
  $('turn-indicator').style.display = '';

  // Set player names
  $('player-x-name').textContent = initialData.playerX || '—';
  $('player-o-name').textContent = initialData.playerO || '—';

  updateScoreDisplay();
  showScreen('game');

  // Clear board visually
  cells.forEach(c=>{
    c.innerHTML = '';
    c.classList.remove('win-cell','x-win','o-win');
  });

  renderBoard(initialData.board || '---------', initialData.turn || 'X', initialData.status || 'playing');

  // Listen for changes
  if(room){
    room.on(function(data, key){
      if(!data || typeof data !== 'object') return;
      // Gun sends metadata as '_' — ignore pure metadata updates
      handleGameUpdate(data);
    });
  }
}

/* ═══════════════════════════════════════════════════════════════
   HANDLE GAME UPDATES
   ═══════════════════════════════════════════════════════════════ */
function handleGameUpdate(data){
  if(!data) return;
  const board = (typeof data.board === 'string' && data.board.length === 9) ? data.board : currentBoard || '---------';
  const turn = data.turn || 'X';
  const status = data.status || 'playing';
  const playerX = data.playerX || '';
  const playerO = data.playerO || '';
  const rc = data.rematch || 0;

  // Rematch detection
  if(rc > rematchCount){
    rematchCount = rc;
    scores = {X:scores.X, O:scores.O, D:scores.D};
    gameActive = true;
    lastRenderedBoard = '';
    lastRenderedStatus = '';
    $('result-banner').style.display = 'none';
    $('result-actions').style.display = 'none';
    $('turn-indicator').style.display = '';
    cells.forEach(c=>{
      c.innerHTML = '';
      c.classList.remove('win-cell','x-win','o-win');
      // Re-trigger animation
      c.style.animation='none';
      c.offsetHeight;
      c.style.animation='';
    });
  }

  // Update player names
  if(playerX) $('player-x-name').textContent = playerX;
  if(playerO) $('player-o-name').textContent = playerO;

  // Make sure we're on game screen
  if(status==='playing' || status.startsWith('win-') || status==='draw'){
    if(!screens.game.classList.contains('active')){
      showScreen('game');
    }
  }

  renderBoard(board, turn, status);
}

/* ═══════════════════════════════════════════════════════════════
   RENDER BOARD
   ═══════════════════════════════════════════════════════════════ */
const WIN_LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function renderBoard(board, turn, status){
  // Validate board is a proper 9-char string
  if(typeof board !== 'string' || board.length !== 9) return;
  currentBoard = board;

  const isPlaying = status === 'playing';
  const isMyTurn = isPlaying && turn === mySymbol;
  const isFinished = status.startsWith('win-') || status === 'draw';

  // Render pieces — detect changes for SFX
  let newPiecePlaced = false;
  for(let i=0; i<9; i++){
    const ch = board[i];
    const cell = cells[i];
    const current = cell.dataset.piece || '-';

    // Always set the data attribute
    cell.dataset.piece = ch;

    // Re-render cell content if it changed or if content is missing
    const hasContent = cell.querySelector('.piece');
    if(ch !== current || (ch !== '-' && !hasContent)){
      if(ch === 'X'){
        cell.innerHTML = '<div class="piece x-piece"><svg viewBox="0 0 100 100"><line x1="25" y1="25" x2="75" y2="75"/><line x1="75" y1="25" x2="25" y2="75"/></svg></div>';
        if(ch !== current && lastRenderedBoard !== '') newPiecePlaced = true;
      } else if(ch === 'O'){
        cell.innerHTML = '<div class="piece o-piece"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="28"/></svg></div>';
        if(ch !== current && lastRenderedBoard !== '') newPiecePlaced = true;
      } else {
        cell.innerHTML = '';
      }
    }

    // Hover states
    cell.classList.toggle('hoverable', isMyTurn && ch === '-');
  }
  if(newPiecePlaced) playPlace();

  // Turn indicator
  const turnEl = $('turn-indicator');
  if(isPlaying){
    if(isMyTurn){
      turnEl.textContent = 'Twój ruch!';
      turnEl.className = 'turn-indicator your-turn';
    } else {
      turnEl.textContent = 'Czekaj na przeciwnika…';
      turnEl.className = 'turn-indicator waiting';
    }
  }

  // Active turn styling on player cards
  $('player-x-info').classList.toggle('active-turn', isPlaying && turn==='X');
  $('player-o-info').classList.toggle('active-turn', isPlaying && turn==='O');

  // Handle finish
  if(isFinished && lastRenderedStatus !== status){
    gameActive = false;
    handleFinish(status, board);
  }

  lastRenderedBoard = board;
  lastRenderedStatus = status;
}

/* ═══════════════════════════════════════════════════════════════
   HANDLE FINISH
   ═══════════════════════════════════════════════════════════════ */
function handleFinish(status, board){
  $('turn-indicator').style.display = 'none';

  // Remove active turn
  $('player-x-info').classList.remove('active-turn');
  $('player-o-info').classList.remove('active-turn');

  const banner = $('result-banner');
  const text = $('result-text');
  const sub = $('result-sub');

  if(status === 'draw'){
    text.textContent = 'REMIS!';
    text.className = 'result-text result-draw';
    sub.textContent = 'Nikt nie wygrywa tym razem';
    scores.D++;
    playDraw();
  } else {
    const winner = status.replace('win-',''); // 'X' or 'O'
    // Highlight winning line
    const winLine = findWinLine(board, winner);
    if(winLine){
      winLine.forEach(idx=>{
        cells[idx].classList.add('win-cell');
        cells[idx].classList.add(winner==='X'?'x-win':'o-win');
      });
    }

    if(winner === mySymbol){
      text.textContent = 'WYGRANA!';
      text.className = 'result-text result-win';
      sub.textContent = 'Gratulacje!';
      playWin();
      submitWin();
    } else {
      text.textContent = 'PRZEGRANA!';
      text.className = 'result-text result-lose';
      sub.textContent = 'Następnym razem będzie lepiej';
      playLose();
    }

    if(winner==='X') scores.X++;
    else scores.O++;
  }

  updateScoreDisplay();

  banner.style.display = '';
  // Re-trigger animation
  banner.style.animation = 'none';
  banner.offsetHeight;
  banner.style.animation = '';

  $('result-actions').style.display = '';
}

function findWinLine(board, symbol){
  for(const line of WIN_LINES){
    if(line.every(i => board[i]===symbol)) return line;
  }
  return null;
}

function updateScoreDisplay(){
  $('score-x').textContent = '✕ ' + scores.X;
  $('score-o').textContent = '○ ' + scores.O;
  $('score-d').textContent = 'Remis ' + scores.D;
}

/* ═══════════════════════════════════════════════════════════════
   CELL CLICKS
   ═══════════════════════════════════════════════════════════════ */
boardEl.addEventListener('click', (e)=>{
  const cell = e.target.closest('.cell');
  if(!cell) return;
  if(!cell.classList.contains('hoverable')) return;
  if(!gameActive || !room) return;

  ensureAudio();

  const i = parseInt(cell.dataset.i);
  if(currentBoard[i] !== '-') return;

  // Make move
  const newBoard = currentBoard.substring(0,i) + mySymbol + currentBoard.substring(i+1);
  const nextTurn = mySymbol === 'X' ? 'O' : 'X';

  // Check win/draw
  let newStatus = 'playing';
  const winLine = findWinLine(newBoard, mySymbol);
  if(winLine){
    newStatus = 'win-' + mySymbol;
  } else if(!newBoard.includes('-')){
    newStatus = 'draw';
  }

  room.put({
    board: newBoard,
    turn: nextTurn,
    status: newStatus
  });
});

/* ═══════════════════════════════════════════════════════════════
   REMATCH
   ═══════════════════════════════════════════════════════════════ */
$('btn-rematch').addEventListener('click', ()=>{
  ensureAudio();
  if(!room) return;

  room.put({
    board: '---------',
    turn: 'X',
    status: 'playing',
    rematch: rematchCount + 1
  });
});

/* ═══════════════════════════════════════════════════════════════
   BACK TO MENU
   ═══════════════════════════════════════════════════════════════ */
$('btn-back-menu').addEventListener('click', ()=>{
  if(room){
    room.off();
  }
  room = null;
  roomCode = '';
  mySymbol = '';
  gameActive = false;
  scores = {X:0, O:0, D:0};
  rematchCount = 0;
  lastRenderedBoard = '';
  lastRenderedStatus = '';

  // Clear board
  cells.forEach(c=>{
    c.innerHTML = '';
    c.dataset.piece = '-';
    c.classList.remove('win-cell','x-win','o-win','hoverable');
  });

  showScreen('entry');
  setStatus('entry-status','');
});

/* ═══════════════════════════════════════════════════════════════
   LEADERBOARD
   ═══════════════════════════════════════════════════════════════ */

// In-memory leaderboard cache
let leaderboardData = {}; // key: nick, value: {name, wins, date}
let leaderboardListenerActive = false;

function startLeaderboardListener(){
  if(!tttLeaderDB || leaderboardListenerActive) return;
  leaderboardListenerActive = true;
  tttLeaderDB.map().on(function(data, key){
    if(!data || typeof data !== 'object') return;
    if(data.name && typeof data.wins === 'number'){
      leaderboardData[key] = {name: data.name, wins: data.wins, date: data.date || 0};
      if(rankingPanelOpen) renderLeaderboard();
    }
  });
}

function submitWin(){
  if(!tttLeaderDB || !myNick) return;
  const key = myNick.toLowerCase().replace(/[^a-z0-9_\-]/g,'_').slice(0,32) || 'player';
  const existing = leaderboardData[key];
  const newWins = existing ? existing.wins + 1 : 1;
  const entry = {name: myNick, wins: newWins, date: Date.now()};
  leaderboardData[key] = entry;
  tttLeaderDB.get(key).put(entry);
  if(rankingPanelOpen) renderLeaderboard();
}

function renderLeaderboard(){
  const body = $('ranking-body');
  if(!body) return;

  const entries = Object.values(leaderboardData)
    .filter(e => e && typeof e.wins === 'number')
    .sort((a,b) => b.wins - a.wins)
    .slice(0, 10);

  if(entries.length === 0){
    body.innerHTML = '<div class="ranking-empty">Brak danych.<br>Wygraj grę, aby pojawić się w rankingu!</div>';
    return;
  }

  let rows = '';
  const meKey = myNick ? myNick.toLowerCase().replace(/[^a-z0-9_\-]/g,'_').slice(0,32) : null;

  entries.forEach((e, idx)=>{;
    const rank = idx + 1;
    const isMe = meKey && e.name && e.name.toLowerCase().replace(/[^a-z0-9_\-]/g,'_').slice(0,32) === meKey;
    const rankClass = rank <= 3 ? ` rank-${rank}` : '';
    const rowClass = rank === 1 ? ' rank-row-1' : '';
    const meBadge = isMe ? '<span class="me-badge">TY</span>' : '';
    const nickClass = isMe ? ' is-me' : '';
    let medalEmoji = '';
    if(rank===1) medalEmoji='🥇 ';
    else if(rank===2) medalEmoji='🥈 ';
    else if(rank===3) medalEmoji='🥉 ';

    rows += `<tr class="${rowClass}">
      <td><span class="rank-num${rankClass}">${medalEmoji || rank}</span></td>
      <td><span class="rank-nick${nickClass}">${escapeHtml(e.name)}${meBadge}</span></td>
      <td><span class="rank-wins">${e.wins}</span></td>
    </tr>`;
  });

  body.innerHTML = `<table class="ranking-table">
    <thead><tr>
      <th>#</th>
      <th>Nick</th>
      <th>Wygrane</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <p class="ranking-updated">Aktualizowane na bieżąco</p>`;
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ─── RANKING PANEL TOGGLE ─────────────────────────────────── */
let rankingPanelOpen = false;

function openRanking(){
  rankingPanelOpen = true;
  $('ranking-panel').classList.add('open');
  $('ranking-overlay').classList.add('open');
  $('ranking-overlay').setAttribute('aria-hidden','false');

  if(!tttLeaderDB){
    $('ranking-body').innerHTML = '<div class="ranking-empty">Ranking niedostępny.<br>Brak połączenia z serwerem.</div>';
    return;
  }
  // Show loader briefly if no data yet
  if(Object.keys(leaderboardData).length === 0){
    $('ranking-body').innerHTML = '<div class="ranking-loader">Ładowanie…</div>';
  } else {
    renderLeaderboard();
  }
}

function closeRanking(){
  rankingPanelOpen = false;
  $('ranking-panel').classList.remove('open');
  $('ranking-overlay').classList.remove('open');
  $('ranking-overlay').setAttribute('aria-hidden','true');
}

$('ranking-btn').addEventListener('click', ()=>{
  if(rankingPanelOpen) closeRanking();
  else openRanking();
});
$('ranking-close').addEventListener('click', closeRanking);
$('ranking-overlay').addEventListener('click', closeRanking);
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && rankingPanelOpen) closeRanking(); });

// Lazy-start listener if Gun was already initted
function ensureLeaderboardListener(){
  if(tttLeaderDB && !leaderboardListenerActive) startLeaderboardListener();
}
