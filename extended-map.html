<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rozszerzona Mapa — Osiedle Rżąka</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0d1117;color:#e2e8f0;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .container{text-align:center;padding:40px}
    h1{font-size:2.5rem;margin-bottom:12px}
    .badge{display:inline-block;padding:6px 16px;background:rgba(74,222,128,.12);border:1px solid #4ade80;border-radius:20px;color:#4ade80;font-size:13px;font-weight:600;margin-bottom:24px}
    p{color:#8b949e;font-size:15px;margin-bottom:32px;max-width:400px;margin-left:auto;margin-right:auto}
    .back{display:inline-block;padding:12px 28px;background:rgba(59,130,246,.15);border:1px solid #3b82f6;border-radius:10px;color:#93c5fd;text-decoration:none;font-weight:700;transition:all .15s}
    .back:hover{background:rgba(59,130,246,.3)}
  </style>
  <script>
    // Sprawdź czy odblokowane
    try {
      var ok = localStorage.getItem('rzaka-extmap-unlocked') === 'true' || sessionStorage.getItem('rzaka-extmap-unlocked') === 'true';
      if (!ok) { window.location.href = './game.html'; }
    } catch(e){}
  </script>
</head>
<body>
  <div class="container">
    <div style="font-size:64px;margin-bottom:16px">🗺️</div>
    <div class="badge">✓ ODBLOKOWANA</div>
    <h1>Rozszerzona Mapa</h1>
    <p>Tu pojawi się większa mapa osiedla Rżąka. Na razie — placeholder. Właściciel wkrótce doda nową zawartość.</p>
    <a href="./index.html" class="back">← Wróć do głównej mapy</a>
  </div>
</body>
</html>
